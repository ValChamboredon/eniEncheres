<header th:fragment="entete" class="bg-white shadow-md py-4">
    <div class="container mx-auto flex justify-between items-center px-6">
        
        <!-- ✅ Left: ENI-Enchères Logo -->
        <a th:href="@{/encheres}" class="text-2xl font-bold text-indigo-600 hover:text-indigo-800">
            ENI - Enchères
        </a>

        <!-- ✅ Right: Navigation -->
        <nav class="flex space-x-4">
            
            <!-- 🔹 If NOT logged in -->
            <div sec:authorize="isAnonymous()" class="flex space-x-4">
                <a th:href="@{/encheres/inscription}" class="text-gray-700 hover:text-indigo-600">S'inscrire</a>
                <a th:href="@{/encheres/connexion}" class="text-gray-700 hover:text-indigo-600">Se connecter</a>
            </div>

            <!-- 🔹 If logged in -->
            <div sec:authorize="isAuthenticated()" class="flex space-x-4">
                <a th:href="@{/encheres/vendre}" class="text-gray-700 hover:text-indigo-600">Vendre un article</a>
                <a th:href="@{/encheres/profil}" class="text-gray-700 hover:text-indigo-600">Mon profil</a>
                <a th:href="@{/deconnexion}" class="text-red-600 hover:text-red-800">Déconnexion</a>
            </div>

        </nav>
    </div>
</header>
