<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nouvelle Vente</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-8">
    <div class="bg-white p-8 rounded-lg shadow-md max-w-2xl mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-center">Nouvelle Vente</h1>
        
        <form th:action="@{/articles}" method="post">
            <div class="mb-4">
                <label class="block text-gray-700">Nom de l'article :</label>
                <input type="text" name="nomArticle" required class="border rounded p-2 w-full">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700">Description :</label>
                <textarea name="description" required class="border rounded p-2 w-full"></textarea>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700">Prix initial :</label>
                <input type="number" name="prixInitial" required class="border rounded p-2 w-full">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700">Date de fin d'enchère :</label>
                <input type="date" name="dateFinEncheres" required class="border rounded p-2 w-full">
            </div>
            <div class="text-center">
                <button type="submit" class="bg-blue-500 text-white py-2 px-4 rounded">Valider</button>
            </div>
        </form>

        <a href="/" class="text-blue-500 hover:underline mt-4 block">Retour</a>
    </div>
</body>
</html>
